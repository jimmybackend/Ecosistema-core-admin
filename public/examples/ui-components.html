<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ecosistema UI Components</title><link rel="stylesheet" href="../assets/css/ecosistema-ui.css"></head>
<body class="theme-light"><main class="eco-main"><h1>Componentes</h1><section class="eco-card"><h2>Botones y badges</h2><button class="btn">Primary</button> <button class="btn btn-outline">Outline</button> <span class="eco-badge success">Activo</span></section>
<section class="eco-card"><h2>Formularios</h2><div class="eco-form-row"><div><label>Nombre</label><input class="eco-form-control" type="text"></div><div><label>Email</label><input class="eco-form-control" type="email"></div></div><label>Archivo</label><input type="file"><div class="eco-switch"><input type="checkbox" id="s1"><label for="s1">Switch demo</label></div></section>
<section class="eco-card" data-tabs><h2>Tabs</h2><div class="eco-tabs"><button class="eco-tab is-active" data-tab="t1">General</button><button class="eco-tab" data-tab="t2">Permisos</button></div><div id="t1" data-tab-panel>Contenido general.</div><div id="t2" data-tab-panel hidden>Contenido permisos.</div></section>
<section class="eco-card"><h2>Accordion</h2><div class="eco-accordion-item"><button class="eco-accordion-btn">Panel 1</button><div>Detalle 1</div></div><div class="eco-accordion-item"><button class="eco-accordion-btn">Panel 2</button><div hidden>Detalle 2</div></div></section>
<section class="eco-card"><h2>Modal / Tabla / Paginación</h2><button class="btn" data-open-modal="#m1">Abrir modal</button><table class="eco-table"><tr><th>Módulo</th><th>Estado</th></tr><tr><td>Mail</td><td>Draft</td></tr></table><div class="eco-pagination"><span class="eco-page">1</span><span class="eco-page">2</span></div></section>
</main><div class="eco-modal" id="m1"><div class="eco-modal-dialog"><h3>Modal demo</h3><p>Sin lógica de negocio.</p><button class="btn" data-close-modal>Cerrar</button></div></div><script src="../assets/js/ecosistema-ui-demo.js"></script></body></html>
